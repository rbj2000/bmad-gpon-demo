# =============================================================================
# load-config.yaml
# Generated by: target-loader-adapter | Date: 2026-02-19
# Purpose: Connection details and entity mapping for Kuwaiba and NetBox.
# Assumptions: Both targets running locally via Docker Compose.
# =============================================================================

# ---------------------------------------------------------------------------
# Kuwaiba target (SOAP)
# ---------------------------------------------------------------------------
kuwaiba:
  wsdl_url: "http://localhost:8881/kuwaiba/KuwaibaService?wsdl"
  username: "admin"
  password: "kuwaiba"               # REVIEW: Change for production
  entity_mapping:
    site:
      class: "City"
      parent_class: null             # Top-level object (DummyRoot)
    rack:
      class: "Rack"
      parent_class: "Room"
    olt:
      class: "OpticalLineTerminal"
      parent_class: "Rack"
    slot:
      class: "Slot"
      parent_class: "OpticalLineTerminal"
    line_card:
      class: "OLTBoard"
      parent_class: "Slot"
    splitter:
      class: "FiberSplitter"
      parent_class: "City"
    sfp_transceiver:
      class: "Transceiver"
      parent_class: "CommunicationsBoard"
    ont:
      class: "OpticalNetworkTerminal"
      parent_class: "City"
  connection_class: "OpticalLink"
  batch_size: 1                      # SOAP is single-object; no native bulk
  service_classes:
    cfs_class: "GPONBroadbandCFS"
    rfs_class: "GPONAccessRFS"
    customer_class: "HomeCustomer"
    customer_pool_name: "GPON Demo Customers"

# ---------------------------------------------------------------------------
# NetBox target (REST)
# ---------------------------------------------------------------------------
netbox:
  base_url: "http://localhost:8000"  # REVIEW: http for local Docker, not https
  token: "0123456789abcdef0123456789abcdef01234567"  # REVIEW: Match docker-compose token
  entity_mapping:
    site:
      endpoint: "/api/dcim/sites/"
      slug_field: "site_id"
    rack:
      endpoint: "/api/dcim/racks/"
    olt:
      endpoint: "/api/dcim/devices/"
      role: "olt"
      device_type: null              # Resolved at runtime from vendor/model
    slot:
      endpoint: "/api/dcim/module-bays/"
    line_card:
      endpoint: "/api/dcim/modules/"
    splitter:
      endpoint: "/api/dcim/devices/"
      role: "splitter"
      device_type: null
    sfp_transceiver:
      endpoint: "/api/dcim/inventory-items/"
      role: "sfp-transceiver"
    ont:
      endpoint: "/api/dcim/devices/"
      role: "ont"
      device_type: null
  cable_endpoint: "/api/dcim/cables/"
  interface_endpoint: "/api/dcim/interfaces/"
  batch_size: 50
  service_classes:
    subscriber_type: "GPONSubscriber"
    cfs_class: "GPONBroadbandCFS"
    rfs_class: "GPONAccessRFS"

# ---------------------------------------------------------------------------
# Shared settings
# ---------------------------------------------------------------------------
load_order:
  - site
  - rack
  - olt
  - slot
  - line_card
  - splitter
  - sfp_transceiver
  - ont
  - connection

csv_files:
  site: "sites.csv"
  rack: "racks.csv"
  olt: "olts.csv"
  slot: "slots.csv"
  line_card: "line_cards.csv"
  splitter: "splitters.csv"
  sfp_transceiver: "sfp_transceivers.csv"
  ont: "onts.csv"
  connection: "connections.csv"
