# =============================================================================
# config.yaml
# Generated by: synthetic-data-generator | Date: 2026-02-19
# Purpose: GPON access network entity definitions for synthetic data.
# Assumptions: 5 sites, 10 OLTs, 40 splitters, 200 ONTs — small demo scale.
# =============================================================================

seed: 42
output_format: csv
output_dir: ./output/

# ---------------------------------------------------------------------------
# Region: controls site names and coordinate bounds.
# Omit this section entirely to use value_pools.py Czech defaults.
# ---------------------------------------------------------------------------
region:
  name: "Czech Republic - Central"
  site_names:
    - "Prague Central CO"
    - "Brno South CO"
    - "Ostrava Main CO"
    - "Plzen West CO"
    - "Liberec North CO"
    - "Olomouc East CO"
    - "Ceske Budejovice CO"
    - "Hradec Kralove CO"
    - "Pardubice CO"
    - "Zlin CO"
  latitude:
    min: 48.0
    max: 50.1
  longitude:
    min: 14.0
    max: 18.7

# ---------------------------------------------------------------------------
# Depth: controls equipment hierarchy levels and splitter cascading.
# ---------------------------------------------------------------------------
depth:
  splitter_cascade_levels: 1   # 1 = OLT→SPL→ONT, 2 = OLT→SPL1→SPL2→ONT
  cascade_ratio: 0.0           # fraction of L1 splitters that get L2 children
  slots_per_olt: [2, 4]        # [min, max] service slots per OLT

# ---------------------------------------------------------------------------
# Complexity: controls vendor diversity, model variety, and failure rates.
# ---------------------------------------------------------------------------
complexity:
  vendor_mode: multi            # single = primary_vendor only, multi = all
  primary_vendor: Huawei        # used when vendor_mode=single
  ont_model_variety: normal     # low = 2 models, normal = all 4
  failure_rate_percent: 5       # 0 = all ACTIVE, higher = more SUSPENDED/INACTIVE

# ---------------------------------------------------------------------------
# Defaults: override value_pools.py constants (deep-merged).
# Omit this section entirely to use value_pools.py as-is.
# Example — restrict to two vendors:
#   defaults:
#     olt_vendors:
#       Huawei: { model: "MA5800-X15", serial_prefix: "HWTC", ... }
#       Nokia:  { model: "ISAM-FX16", serial_prefix: "ALCI", ... }
#     olt_vendor_weights: [0.6, 0.4]
# ---------------------------------------------------------------------------

entities:
  site:
    volume: 5
    attributes:
      site_id:    { pattern: "SITE-{seq:04d}" }
      site_name:  { pool: "SITE_NAMES" }
      latitude:   { distribution: uniform, min: 48.0, max: 50.1 }
      longitude:  { distribution: uniform, min: 14.0, max: 18.7 }
      status:     { enum: [ACTIVE, PLANNED], weights: [0.9, 0.1] }

  rack:
    parent: site
    attributes:
      rack_id:        { pattern: "RACK-{parent.site_id}-{seq:02d}" }
      rack_name:      { pattern: "R{seq:02d}" }
      u_height:       { value: 42 }

  olt:
    volume: 10
    parent: site
    attributes:
      olt_id:      { pattern: "OLT-{parent.site_id}-{seq:02d}" }
      vendor:      { enum: [Huawei, Nokia, ZTE], weights: [0.5, 0.3, 0.2] }
      model:       { lookup: vendor, map: { Huawei: "MA5800-X15", Nokia: "ISAM-FX16", ZTE: "C600" } }
      serial:      { pattern: "{vendor_prefix}{hex:8}" }
      software:    { lookup: vendor, map: { Huawei: "MA5800V800R021C00", Nokia: "ISAM-R6.2.1", ZTE: "ZTE-V6.0.10P3" } }
      status:      { enum: [IN_SERVICE, MAINTENANCE], weights: [0.95, 0.05] }

  slot:
    parent: olt
    attributes:
      slot_id:      { pattern: "SLOT-{parent.olt_id}-{seq:02d}" }
      slot_number:  { description: "Chassis position number" }
      slot_type:    { enum: [service, control] }

  line_card:
    parent: slot
    attributes:
      card_id:      { pattern: "CARD-{parent.slot_id}" }
      card_model:   { description: "Vendor-specific card model" }
      port_count:   { description: "Number of ports on the card" }
      card_type:    { enum: [gpon, control] }
      serial:       { pattern: "{vendor_prefix}{hex:8}" }

  splitter:
    volume: 40
    parent: olt
    attributes:
      splitter_id:  { pattern: "SPL-{parent.olt_id}-{seq:02d}" }
      split_ratio:  { enum: ["1:8", "1:16", "1:32"], weights: [0.2, 0.5, 0.3] }
      olt_port:     { description: "Assigned port in 0/slot/port format" }
      location:     { pattern: "Cab-{parent.site_id}-R{seq:02d}" }

  sfp_transceiver:
    parent: line_card
    attributes:
      sfp_id:       { pattern: "SFP-{parent.card_id}-{seq:02d}" }
      sfp_class:    { enum: ["B+", "C+", "C++"], weights: [0.3, 0.5, 0.2] }
      wavelength:   { value: "1490/1310nm" }
      port_index:   { description: "Port number on the line card" }

  ont:
    volume: 200
    parent: splitter
    attributes:
      ont_id:         { pattern: "ONT-{seq:06d}" }
      serial_number:  { pattern: "{vendor_prefix}{hex:8}" }
      ont_model:      { enum: [HG8245H, HG8546M, F660, I-010G-Q], weights: [0.35, 0.25, 0.25, 0.15] }
      customer_ref:   { pattern: "CUST-{hex:12}" }
      status:         { enum: [ACTIVE, SUSPENDED, INACTIVE], weights: [0.85, 0.10, 0.05] }
